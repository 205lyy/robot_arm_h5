<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0f172a"/>
  <g transform="translate(40, 60)">
    <rect x="0" y="0" width="100" height="100" fill="#1e293b" stroke="#22d3ee" stroke-width="2" rx="5"/>
    <circle cx="50" cy="40" r="20" fill="none" stroke="#22d3ee" stroke-width="3"/>
    <circle cx="50" cy="40" r="8" fill="#22d3ee"/>
    <text x="50" y="80" fill="#22d3ee" font-size="14" font-weight="bold" text-anchor="middle">示教</text>
    <text x="50" y="100" fill="#94a3b8" font-size="10" text-anchor="middle">手动引导</text>
  </g>
  <g transform="translate(150, 60)">
    <rect x="0" y="0" width="100" height="100" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5"/>
    <rect x="20" y="25" width="60" height="40" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <line x1="30" y1="40" x2="60" y2="55" stroke="#3b82f6" stroke-width="2"/>
    <text x="50" y="80" fill="#3b82f6" font-size="14" font-weight="bold" text-anchor="middle">离线</text>
    <text x="50" y="100" fill="#94a3b8" font-size="10" text-anchor="middle">虚拟仿真</text>
  </g>
  <g transform="translate(260, 60)">
    <rect x="0" y="0" width="100" height="100" fill="#1e293b" stroke="#a855f7" stroke-width="2" rx="5"/>
    <circle cx="50" cy="40" r="20" fill="none" stroke="#a855f7" stroke-width="3"/>
    <circle cx="50" cy="40" r="12" fill="none" stroke="#a855f7" stroke-width="2"/>
    <circle cx="50" cy="40" r="4" fill="#a855f7"/>
    <text x="50" y="80" fill="#a855f7" font-size="14" font-weight="bold" text-anchor="middle">自主</text>
    <text x="50" y="100" fill="#94a3b8" font-size="10" text-anchor="middle">AI驱动</text>
  </g>
  <line x1="40" y1="180" x2="360" y2="180" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="200" y="210" fill="#64748b" font-size="16" font-weight="bold" text-anchor="middle">三种控制方式</text>
  <text x="200" y="235" fill="#94a3b8" font-size="12" text-anchor="middle">从手动到智能</text>
</svg>