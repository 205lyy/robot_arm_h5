<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#grad2)"/>
  <g transform="translate(80, 150)">
    <text x="0" y="-60" fill="#22d3ee" font-size="16" font-weight="bold" text-anchor="middle">旋转关节</text>
    <text x="0" y="-45" fill="#94a3b8" font-size="12" text-anchor="middle">Revolute Joint</text>
    <circle cx="0" cy="0" r="40" fill="#1e293b" stroke="#22d3ee" stroke-width="3"/>
    <circle cx="0" cy="0" r="10" fill="#22d3ee" filter="url(#glow2)"/>
    <circle cx="0" cy="0" r="25" fill="none" stroke="#06b6d4" stroke-width="2" stroke-dasharray="4"/>
    <line x1="0" y1="-40" x2="0" y2="-60" stroke="#22d3ee" stroke-width="3"/>
    <line x1="0" y1="40" x2="0" y2="60" stroke="#22d3ee" stroke-width="3"/>
    <line x1="-40" y1="0" x2="-60" y2="0" stroke="#22d3ee" stroke-width="3"/>
    <line x1="40" y1="0" x2="60" y2="0" stroke="#22d3ee" stroke-width="3"/>
    <g>
      <line x1="0" y1="-40" x2="35" y2="-35" stroke="#3b82f6" stroke-width="8" stroke-linecap="round"/>
      <circle cx="35" cy="-35" r="8" fill="#22d3ee" filter="url(#glow2)"/>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="3s" repeatCount="indefinite"/>
    </g>
    <circle cx="-25" cy="25" r="8" fill="#3b82f6" opacity="0.6">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="25" cy="-25" r="6" fill="#22d3ee" opacity="0.6">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="80" fill="#94a3b8" font-size="12" text-anchor="middle">绕轴旋转</text>
  </g>
  <line x1="200" y1="20" x2="200" y2="280" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <g transform="translate(320, 150)">
    <text x="0" y="-60" fill="#3b82f6" font-size="16" font-weight="bold" text-anchor="middle">移动关节</text>
    <text x="0" y="-45" fill="#94a3b8" font-size="12" text-anchor="middle">Prismatic Joint</text>
    <rect x="-30" y="-50" width="60" height="100" fill="none" stroke="#3b82f6" stroke-width="3"/>
    <rect x="-20" y="-50" width="40" height="100" fill="none" stroke="#06b6d4" stroke-width="2" stroke-dasharray="4"/>
    <rect x="-25" y="-40" width="50" height="30" fill="#3b82f6" opacity="0.8">
      <animate attributeName="y" values="-40;30;-40" dur="2s" repeatCount="indefinite"/>
    </rect>
    <circle cx="0" cy="-40" r="5" fill="#fff" filter="url(#glow2)">
      <animate attributeName="cy" values="-40;30;-40" dur="2s" repeatCount="indefinite"/>
    </circle>
    <line x1="0" y1="-50" x2="0" y2="-60" stroke="#3b82f6" stroke-width="2"/>
    <line x1="0" y1="50" x2="0" y2="60" stroke="#3b82f6" stroke-width="2"/>
    <line x1="-30" y1="0" x2="-40" y2="0" stroke="#3b82f6" stroke-width="2"/>
    <line x1="30" y1="0" x2="40" y2="0" stroke="#3b82f6" stroke-width="2"/>
    <text x="0" y="80" fill="#94a3b8" font-size="12" text-anchor="middle">沿轴移动</text>
  </g>
  <text x="200" y="290" text-anchor="middle" fill="#64748b" font-size="14">关节运动类型对比</text>
</svg>