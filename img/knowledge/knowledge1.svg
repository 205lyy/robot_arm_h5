<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0f172a"/>
  <line x1="200" y1="50" x2="200" y2="200" stroke="#22d3ee" stroke-width="4"/>
  <line x1="120" y1="125" x2="280" y2="125" stroke="#ef4444" stroke-width="4"/>
  <line x1="200" y1="125" x2="160" y2="170" stroke="#22c55e" stroke-width="4"/>
  <circle cx="200" cy="125" r="3" fill="#fff"/>
  <text x="205" y="45" fill="#22d3ee" font-size="16" font-weight="bold">Z</text>
  <text x="285" y="130" fill="#ef4444" font-size="16" font-weight="bold">X</text>
  <text x="150" y="175" fill="#22c55e" font-size="16" font-weight="bold">Y</text>
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="100" height="100" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5"/>
    <text x="50" y="30" fill="#3b82f6" font-size="14" font-weight="bold" text-anchor="middle">位置</text>
    <text x="20" y="55" fill="#ef4444" font-size="12">X - 左右</text>
    <text x="20" y="75" fill="#22c55e" font-size="12">Y - 前后</text>
    <text x="20" y="95" fill="#22d3ee" font-size="12">Z - 上下</text>
  </g>
  <g transform="translate(240, 80)">
    <rect x="0" y="0" width="100" height="100" fill="#1e293b" stroke="#3b82f6" stroke-width="2" rx="5"/>
    <text x="50" y="30" fill="#3b82f6" font-size="14" font-weight="bold" text-anchor="middle">姿态</text>
    <text x="20" y="55" fill="#ef4444" font-size="12">翻滚</text>
    <text x="20" y="75" fill="#22c55e" font-size="12">俯仰</text>
    <text x="20" y="95" fill="#22d3ee" font-size="12">偏航</text>
  </g>
  <text x="200" y="240" fill="#64748b" font-size="16" font-weight="bold" text-anchor="middle">6自由度</text>
  <text x="200" y="265" fill="#94a3b8" font-size="12" text-anchor="middle">3位置 + 3姿态</text>
</svg>