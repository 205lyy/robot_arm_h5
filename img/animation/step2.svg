<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
<defs>
<linearGradient id="s2ArmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" style="stop-color:#f59e0b"/>
<stop offset="100%" style="stop-color:#fbbf24"/>
</linearGradient>
</defs>
<style>
@keyframes rotateCircle { 0% {transform:rotate(0deg);} 100% {transform:rotate(360deg);} }
</style>
<rect width="512" height="512" fill="#1e293b"/>
<circle cx="256" cy="420" r="40" fill="#334155" stroke="#f59e0b" stroke-width="3"/>
<circle cx="256" cy="420" r="22" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
<circle cx="256" cy="420" r="55" stroke="rgba(245,158,11,0.3)" stroke-width="3" stroke-dasharray="8,4">
<animateTransform attributeName="transform" type="rotate" from="0 256 420" to="360 256 420" dur="4s" repeatCount="indefinite"/>
</circle>
<g transform="translate(256, 420)">
<animateTransform attributeName="transform" type="rotate" from="0" to="90" dur="3s" repeatCount="indefinite"/>
<rect x="-6" y="-100" width="12" height="100" rx="4" fill="url(#s2ArmGrad)"/>
<circle cx="0" cy="-100" r="5" fill="#fbbf24"/>
<rect x="-4" y="-180" width="8" height="80" rx="3" fill="url(#s2ArmGrad)"/>
<circle cx="0" cy="-180" r="4" fill="#fcd34d"/>
<rect x="-3" y="-240" width="6" height="60" rx="2" fill="#fbbf24"/>
<circle cx="0" cy="-240" r="3" fill="#f59e0b"/>
<rect x="-2" y="-280" width="4" height="40" rx="2" fill="#fcd34d"/>
<circle cx="0" cy="-280" r="2" fill="#fbbf24"/>
<rect x="-3" y="-300" width="6" height="20" rx="1" fill="#22c55e"/>
<circle cx="0" cy="-300" r="4" fill="none" stroke="#22c55e" stroke-width="2"/>
</g>
<path d="M256 420 L320 380 L380 350" stroke="rgba(245,158,11,0.4)" stroke-width="3" stroke-dasharray="6,3" fill="none">
<animate attributeName="stroke-dashoffset" from="0" to="18" dur="1.5s" repeatCount="indefinite"/>
</path>
<circle cx="380" cy="350" r="6" fill="#f59e0b">
<animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite"/>
</circle>
<text x="400" y="355" font-family="sans-serif" font-size="12" fill="#f59e0b">旋转方向</text>
<text x="256" y="485" font-family="sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">步骤2：腰部旋转</text>
</svg>