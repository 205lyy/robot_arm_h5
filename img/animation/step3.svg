<text x="320" y="185" font-family="sans-serif" font-size="12" fill="#8b5cf6">伸展方向</text>
<text x="256" y="485" font-family="sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">步骤3：臂部伸展</text>
